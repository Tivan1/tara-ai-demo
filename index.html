<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tara — Turbo Ecosystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #151217;
    --ink-soft: #1e1a22;
    --ink-line: #2c2732;
    --cream: #f3efe9;
    --cream-dim: #cfc7bd;
    --gum: #ff5fa2;
    --gum-deep: #e0417f;
    --lilac: #9b8fb4;
    --ok: #6fce9f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% -10%, #221b28 0%, var(--ink) 55%) fixed;
    color: var(--cream);
    font-family: "Inter", system-ui, sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  .shell {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: 0 clamp(12px, 4vw, 28px);
  }

  /* Header */
  header {
    padding: 26px 4px 18px;
    border-bottom: 1px solid var(--ink-line);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 14px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .sigil {
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gum) 0%, var(--gum-deep) 70%);
    position: relative; flex: none;
    box-shadow: 0 0 0 4px rgba(255,95,162,0.12);
  }
  .sigil::after {
    content: ""; position: absolute; width: 13px; height: 13px; border-radius: 50%;
    background: rgba(255,255,255,0.85); top: 10px; left: 11px; filter: blur(0.3px);
  }
  h1 {
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: 30px; letter-spacing: -0.02em; line-height: 1;
  }
  .tagline {
    font-size: 12.5px; color: var(--lilac); margin-top: 4px; letter-spacing: 0.01em;
  }
  .status {
    font-size: 11px; color: var(--cream-dim); text-align: right;
    display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
  }
  .dot { display: inline-flex; align-items: center; gap: 6px; }
  .dot i { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }

  /* Conversation */
  .stream {
    flex: 1; overflow-y: auto; padding: 22px 2px 8px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin; scrollbar-color: var(--ink-line) transparent;
  }
  .msg { display: flex; flex-direction: column; max-width: 82%; }
  .msg .who {
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--lilac); margin: 0 4px 5px;
  }
  .bubble {
    padding: 12px 15px; border-radius: 16px; font-size: 15px; line-height: 1.5;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .from-tara { align-self: flex-start; }
  .from-tara .bubble {
    background: var(--ink-soft); border: 1px solid var(--ink-line);
    border-bottom-left-radius: 5px; color: var(--cream);
  }
  .from-user { align-self: flex-end; align-items: flex-end; }
  .from-user .bubble {
    background: linear-gradient(135deg, var(--gum) 0%, var(--gum-deep) 100%);
    color: #22101a; font-weight: 500; border-bottom-right-radius: 5px;
  }
  .from-user .who { color: var(--gum); }
  .deflect-tag {
    font-size: 10px; color: var(--gum); margin: 5px 4px 0; letter-spacing: 0.04em;
    opacity: 0.8;
  }

  /* Typing indicator */
  .typing .bubble { display: inline-flex; gap: 5px; padding: 15px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--lilac);
    animation: bob 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bob { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }

  /* Composer */
  .composer {
    padding: 14px 0 max(16px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--ink-line);
    display: flex; gap: 10px; align-items: flex-end;
  }
  textarea {
    flex: 1; resize: none; background: var(--ink-soft); color: var(--cream);
    border: 1px solid var(--ink-line); border-radius: 14px; padding: 13px 15px;
    font: inherit; font-size: 15px; line-height: 1.4; max-height: 120px;
    transition: border-color 0.15s;
  }
  textarea:focus { outline: none; border-color: var(--gum); }
  textarea::placeholder { color: #6b6474; }

  /* Send button — the gum-bubble signature */
  .send {
    flex: none; width: 50px; height: 50px; border-radius: 50%;
    border: none; cursor: pointer; position: relative;
    background: linear-gradient(135deg, var(--gum) 0%, var(--gum-deep) 100%);
    display: grid; place-items: center; transition: transform 0.12s;
  }
  .send:hover:not(:disabled) { transform: scale(1.06); }
  .send:active:not(:disabled) { transform: scale(0.94); }
  .send:disabled { opacity: 0.4; cursor: default; }
  .send svg { width: 20px; height: 20px; fill: #22101a; }
  .send:focus-visible { outline: 3px solid var(--cream); outline-offset: 2px; }
  /* the bubble that inflates + pops */
  .send.pop::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid var(--gum);
    animation: pop 0.5s ease-out forwards;
  }
  @keyframes pop {
    0% { transform: scale(1); opacity: 0.9; }
    70% { transform: scale(1.8); opacity: 0.35; }
    100% { transform: scale(2.1); opacity: 0; }
  }

  .disclaimer {
    text-align: center; font-size: 10.5px; color: #6b6474;
    padding: 0 8px 10px; line-height: 1.4;
  }

  @media (prefers-reduced-motion: reduce) {
    .typing span, .send.pop::before { animation: none; }
  }
</style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="sigil" aria-hidden="true"></div>
        <div>
          <h1>Tara</h1>
          <div class="tagline">Smarter. Sharper. Cuter.</div>
        </div>
      </div>
      <div class="status">
        <span class="dot"><i></i> online</span>
        <span>AI companion · prototype</span>
      </div>
    </header>

    <main class="stream" id="stream" aria-live="polite"></main>

    <div class="composer">
      <textarea id="input" rows="1" placeholder="Say something to Tara…" aria-label="Message Tara"></textarea>
      <button class="send" id="send" aria-label="Send message">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
      </button>
    </div>
    <p class="disclaimer">Tara is an AI character and can get things wrong. She never gives financial advice. Conceptual prototype — nothing here is final.</p>
  </div>

<script>
  const stream = document.getElementById("stream");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  // Conversation state kept in memory only (no storage APIs).
  const history = [];

  const GREETING = "Oh good, someone to talk to. I'm Tara — sharp half of the operation, Turbo's the other half. Ask me anything. *pop*";

  function addMessage(role, text, deflectCategory) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + (role === "tara" ? "from-tara" : "from-user");
    const who = document.createElement("div");
    who.className = "who";
    who.textContent = role === "tara" ? "Tara" : "You";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.append(who, bubble);
    if (deflectCategory) {
      const tag = document.createElement("div");
      tag.className = "deflect-tag";
      tag.textContent = "↳ safety layer engaged · " + deflectCategory;
      wrap.appendChild(tag);
    }
    stream.appendChild(wrap);
    stream.scrollTop = stream.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg from-tara typing";
    wrap.id = "typing";
    wrap.innerHTML = '<div class="who">Tara</div><div class="bubble"><span></span><span></span><span></span></div>';
    stream.appendChild(wrap);
    stream.scrollTop = stream.scrollHeight;
  }
  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function autogrow() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  }
  input.addEventListener("input", autogrow);

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // gum-bubble pop
    send.classList.remove("pop");
    void send.offsetWidth;
    send.classList.add("pop");

    addMessage("user", text);
    history.push({ role: "user", content: text });
    input.value = "";
    autogrow();
    input.focus();

    send.disabled = true;
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      hideTyping();

      if (!res.ok) {
        addMessage("tara", "Hm — I glitched for a second there. Try me again?");
        console.error(data);
      } else {
        addMessage("tara", data.reply, data.deflected);
        history.push({ role: "assistant", content: data.reply });
      }
    } catch (err) {
      hideTyping();
      addMessage("tara", "Couldn't reach the back room. Check the connection and try again.");
      console.error(err);
    } finally {
      send.disabled = false;
    }
  }

  send.addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Tara opens the conversation.
  addMessage("tara", GREETING);
</script>
</body>
</html>
